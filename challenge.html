<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    {{if .SiteKey}}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
        function submitForm() {
            document.getElementById("challenge-form").submit();
        }
    </script>
    {{else}}
    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function solvePoW() {
            const salt = "{{.PoWSalt}}";
            const targetPrefix = "0000"; // Difficulty 4
            let nonce = 0;

            while (true) {
                const hash = await sha256(salt + nonce);
                if (hash.startsWith(targetPrefix)) {
                    document.getElementById("pow-nonce").value = nonce;
                    document.getElementById("challenge-form").submit();
                    return;
                }
                nonce++;
                // Yield to main thread every 1000 iterations so UI doesn't freeze completely
                if (nonce % 1000 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
        }
        
        window.onload = function() {
            solvePoW();
        };
    </script>
    {{end}}
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000000;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 16px;
        }
        .cf-turnstile {
            margin-bottom: 20px;
        }
        .footer {
            font-size: 0.9rem;
            color: #666666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer a {
            color: #aaaaaa;
            text-decoration: none;
        }
        .footer a:hover {
            color: #ffffff;
        }
        .footer span {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        @media (max-width: 600px) {
            body {
                font-size: 18px;
            }
            .footer {
                font-size: 1.1rem;
                text-align: center;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <form id="challenge-form" method="POST" action="/challenge/verify">
        <input type="hidden" name="original_url" value="{{.OriginalURL}}">
        {{if .SiteKey}}
        <div class="cf-turnstile" data-sitekey="{{.SiteKey}}" data-callback="submitForm"></div>
        {{else}}
        <input type="hidden" name="pow_nonce" id="pow-nonce" value="">
        {{end}}
    </form>
    <div class="footer">
        <span>DDoS protection by <a href="https://hegy.xyz" target="_blank" rel="noopener noreferrer">Hegy.xyz</a></span>
    </div>
</body>
</html>
